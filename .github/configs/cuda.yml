# CUDA Hardware Configuration
# This file defines CI/CD settings for CUDA-based testing

platform: cuda

# Docker image for this hardware
ci_image: harbor.baai.ac.cn/flagos-dev/vllm-plugin-fl:v0.20.2-cuda-ci

# Runner labels for this hardware (self-hosted)
runner_labels:
  - self-hosted
  - Linux
  - X64
  - nvidia
  - gpu-8
  - cuda130

# Runner labels for this hardware (Platform hosted)
# runner_labels:
#   - ci-vllm-plugin-fl

# Container volumes (hardware-specific paths)
container_volumes:
  - /data:/data

# Container options (hardware-specific settings)
container_options: >-
  --privileged
  --gpus all
  --shm-size=500g
  --hostname vllm-plugin-fl
  --user root
  --ulimit nofile=65535:65535
