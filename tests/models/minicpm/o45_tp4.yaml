# MiniCPM-O 4.5 multimodal model configuration (TP=2, audio)

llm:
  model: "/data/models/MiniCPM"
  tensor_parallel_size: 4
  max_model_len: 2048
  max_num_batched_tokens: 2048
  gpu_memory_utilization: 0.7
  max_num_seqs: 2
  enforce_eager: true
  trust_remote_code: true
  load_format: "dummy"

generate:
  modality: audio
  prompts:
    - question: "What is 1+1?"
      asset_count: 0
    - question: "What is recited in the audio?"
      asset_count: 1
    - question: "What sport and what nursery rhyme are referenced?"
      asset_count: 2
  assets:
    - mary_had_lamb
    - winning_call
  sampling:
    max_tokens: 128
    temperature: 0.2

serve:
  api_key: "token-abc123"
  # Override engine params for serving (e.g. dtype)
  extra_engine:
    dtype: "auto"
  endpoints: [chat]
  chat_messages:
    - role: user
      content: "Running test."
  max_tokens: 100
