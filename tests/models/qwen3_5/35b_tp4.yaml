# Qwen3.5-35B-A3B model configuration (TP=4)

llm:
  model: "/data/models/Qwen/Qwen3.5-35B-A3B"
  tensor_parallel_size: 4
  max_num_seqs: 512
  max_model_len: 2048
  gpu_memory_utilization: 0.8
  enforce_eager: true
  trust_remote_code: true

generate:
  prompts:
    - "Hello, my name is"
    - text: "The capital of France is"
      expected: "Paris"
  sampling:
    max_tokens: 10
    temperature: 0.0
