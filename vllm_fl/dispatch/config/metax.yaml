# vLLM-FL Dispatch Configuration for METAX
# Auto-loaded when running on METAX GPU hardware

# Preferred default backend type: flagos, vendor, reference
prefer: flagos

# Strict Mode:
#   true  = Raise an error immediately on failure; do not attempt other backends.
#   false = Attempt the next available backend in sequence upon failure (Default).
strict: false

# Vendor Whitelist (Optional, allows all if not set)
# allow_vendors:
#  - metax

# Vendor Blacklist (Optional)
# deny_vendors:
#   - cuda

# Per-operator backend execution order (Optional)
# Only the backends listed here will be attempted, in the order specified.
#
# Supported tokens:
#   - flagos        : Default FlagOS implementation (Triton)
#   - reference     : PyTorch reference implementation
#   - vendor        : Any available vendor backend (auto-detected)
#   - vendor:metax   : METAX-specific vendor backend
op_backends:
  # attention_backend: prioritize vendor (MACA attention)
  attention_backend:
    - vendor:metax
  # All other ops: prefer FlagGems (Triton), fallback to reference (PyTorch native)
  silu_and_mul:
    - flagos
    - reference
  rms_norm:
    - flagos
    - reference
  rotary_embedding:
    - flagos
    - reference
  topk_softmax:
    - flagos
    - reference

# FlagOS operator blacklist
flagos_blacklist:
  - masked_fill
  - masked_fill_

# OOT (Out-of-Tree) operator blacklist
oot_blacklist:
  - masked_fill
  - masked_fill_
